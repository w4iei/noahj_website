cv:
  name: Noah Jaffe
  label: Systems Engineer, Instrument Developer, and Researcher
  location: Amsterdam
  image: ""
  summary: Noah Jaffe works across sensing, embedded systems, measurement, and historical keyboard instruments. His background combines hardware engineering, computational analysis, and instrument-centered research, with a focus on building systems that make complex physical behavior measurable, interpretable, and usable in performance.

  address:
    city: Amsterdam

  sections:
    Education:
      - institution: University of Amsterdam, Institute for Logic, Language and Computation (ILLC)
        location: Amsterdam
        area: Computational Musicology
        studyType: Ph.D. (in progress)
        start_date: 2024
        end_date: 2028
        highlights:
          - Research on historical keyboard performance and the development of non-invasive sensing systems for harpsichords and early pianos.

      - institution: University of Amsterdam
        location: Amsterdam
        area: Musicology
        studyType: M.A.
        start_date: 2021
        end_date: 2022
        highlights:
          - "Thesis: *Musical Source Separation: WSDR---Lending Weight to SDR*"

      - institution: Georgia Institute of Technology
        location: Atlanta, Georgia
        area: Electrical Engineering
        studyType: B.S.
        start_date: 2009
        end_date: 2013

    Experience:
      - company: Institute for Logic, Language and Computation (ILLC), University of Amsterdam
        position: PhD Researcher
        location: Amsterdam
        start_date: 2024
        end_date: Present
        summary: Researches historical keyboard performance and develops non-invasive sensing systems for harpsichords and early pianos.
        highlights:
          - "Developed **PHOTON**, a modular optical sensing platform for high-resolution performance capture in research and concert settings."

      - company: klavecimbel.com
        position: Founder & Engineer
        location: Amsterdam
        start_date: 2024
        end_date: Present
        summary: Develops software and hardware systems for historical keyboard instruments.
        highlights:
          - Built a Raspberry Pi-based Pianoteq retrofit for modern MIDI keyboards oriented toward historically informed keyboard performance.
          - Designed the PHOTON retrofit for acoustic historical keyboard instruments, including optical sensing hardware, custom PCBs, and embedded systems for performance capture and MIDI output.

      - company: Stichting Tijdloze Klavieren
        position: Executive & Artistic Director
        location: Amsterdam
        start_date: 2024
        end_date: Present
        summary: Directs a foundation focused on historically informed keyboard performance and instrument-centered concert programming.
        highlights:
          - Leads artistic programming, collaborations, fundraising, and the development of new performance formats for harpsichord and fortepiano.
          - Built and maintains AmsterdamEarlyMusic.com, a public calendar and submission platform for Amsterdam's early music scene.

      - company: Apple Inc.
        position: Hardware and Software Engineer, Wireless Hardware Engineering
        location: Cupertino, California
        start_date: 2013
        end_date: 2020
        summary: Worked on iPhone RF front-end systems and the Python-based tooling used to model, validate, and debug them from prototyping through production bring-up.
        highlights:
          - Developed Python test and analysis infrastructure for RF characterization and production validation, including instrument control, calibration, and automated measurement workflows.
          - Built models of the iPhone RF front end to generate firmware configuration profiles and support system-level validation.
          - Led bench debugging during prototyping and factory bring-up, tracing performance issues across hardware, measurement setups, and production test flows.

      - company: Apple Inc.
        position: Wireless Hardware Engineering Intern
        location: Cupertino, California
        start_date: 2012
        end_date: 2012
        highlights:
          - Developed factory test software for antenna validation using vector network analyzers (VNAs) and automated measurement workflows.
          - Built a macOS Cocoa application in Objective-C for production test control, data collection, and pass/fail reporting in manufacturing environments.

      - company: Research In Motion (BlackBerry)
        position: Wireless Hardware Engineering Intern
        location: Sunrise, Florida
        start_date: 2011
        end_date: 2011
        highlights:
          - Performed receiver sensitivity and desense testing for GSM/WCDMA devices, investigating RF performance degradation due to EMI and digital noise coupling.
          - Implemented mitigations via drive-strength tuning, shielding and grounding changes, and board-level coupling investigations.

    Publications:
      - title: "Musical Source Separation Bake-Off: Comparing Objective Metrics with Human Perception"
        publisher: Proceedings of the IEEE Workshop on Applications of Signal Processing to Audio and Acoustics (WASPAA)
        releaseDate: 2025-11-14
        url: https://arxiv.org/abs/2507.06917

      - title: "PHOTON: Non-Invasive Optical Tracking of Key-Lever Motion in Historical Keyboard Instruments"
        publisher: Proceedings of the International Conference on New Interfaces for Musical Expression (NIME)
        releaseDate: 2026
        summary: Accepted for publication

      - title: "The Portable Harpsichord: Past and Present"
        publisher: "Harpsichord & fortepiano Magazine"
        releaseDate: 2026

    Skills:
      - name: RF and hardware systems
        keywords:
          - RF systems debugging
          - bench characterization
          - factory bring-up

      - name: Software and analysis
        keywords:
          - Python-based test automation
          - analytics tooling
          - data visualization

      - name: Embedded systems
        keywords:
          - RFFE configuration modeling
          - firmware integration workflows
          - custom sensor boards and PCBs

      - name: Research instruments
        keywords:
          - historical keyboard instrument sensing systems
          - research prototyping
          - multimodal performance data
