cv:
  name: Noah Jaffe
  label: PhD Researcher, Musicologist, and Hardware/Software Engineer
  location: Amsterdam
  image: ""
  summary: Noah Jaffe is a PhD researcher, musicologist, and instrument developer working at the intersection of historical keyboard instruments, artistic research, and digital instrument design. His background combines engineering, computational musicology, and analytical tools for complex cultural data.

  address:
    city: Amsterdam

  sections:
    Education:
      - institution: University of Amsterdam, Institute for Logic, Language and Computation (ILLC)
        location: Amsterdam
        area: Computational Musicology
        studyType: Ph.D. (in progress)
        start_date: 2024
        end_date: 2028
        highlights:
          - Research on historical keyboard performance and the development of non-invasive sensing systems for harpsichords and early pianos.

      - institution: University of Amsterdam
        location: Amsterdam
        area: Musicology
        studyType: M.A.
        start_date: 2021
        end_date: 2022
        highlights:
          - "Thesis: *Musical Source Separation: WSDR---Lending Weight to SDR*"

      - institution: Georgia Institute of Technology
        location: Atlanta, Georgia
        area: Electrical Engineering
        studyType: B.S.
        start_date: 2009
        end_date: 2013

    Experience:
      - company: Institute for Logic, Language and Computation (ILLC), University of Amsterdam
        position: PhD Researcher
        location: Amsterdam
        start_date: 2024
        end_date: Present
        summary: Research on historical keyboard performance and the development of non-invasive sensing systems for harpsichords and early pianos.
        highlights:
          - "Developer of the **PHOTON** system: a modular optical sensing platform enabling high-resolution performance capture for research and concert applications."

      - company: klavecimbel.com
        position: Founder & Engineer
        location: Amsterdam
        start_date: 2024
        end_date: Present
        highlights:
          - Developed a Raspberry Pi-based Pianoteq retrofit enabling historically informed keyboard sounds on existing MIDI keyboards.
          - Created the PHOTON retrofit for acoustic historical keyboard instruments, including custom sensor boards, PCBs, and embedded systems to produce MIDI output.

      - company: Stichting Tijdloze Klavieren
        position: Executive & Artistic Director
        location: Amsterdam
        start_date: 2024
        end_date: Present
        highlights:
          - Founder and director of a foundation producing historically informed harpsichord and fortepiano concerts.
          - Lead artistic programming, collaborations, fundraising, and development of instrument-centered performance formats.
          - Built AmsterdamEarlyMusic.com, a community-driven early music calendar for Amsterdam with user-submitted listings.

      - company: Apple Inc.
        position: Hardware and Software Engineer, Wireless Hardware Engineering
        location: Cupertino, California
        start_date: 2013
        end_date: 2020
        summary: Eight years at Apple developing iPhone wireless communication hardware and related test infrastructure.
        highlights:
          - Led bench debugging and analysis during prototyping and factory bring-up.
          - Developed Python-based RF test automation for characterization and production validation, including bench control, path-loss calibration, and 3GPP LTE-aligned test procedures.
          - Built internal RF analytics and visualization tools used across multiple iPhone product lines to diagnose radio performance issues and communicate regressions to engineering leadership.
          - Developed an XML-based modeling system representing the complete iPhone RF front-end (PAs, switches, duplexers, LNAs), generating RFFE configuration profiles integrated directly into production firmware.

      - company: Apple Inc.
        position: Wireless Hardware Engineering Intern
        location: Cupertino, California
        start_date: 2012
        end_date: 2012
        highlights:
          - Developed factory test software for antenna validation using vector network analyzers (VNAs) and automated measurement workflows.
          - Built a macOS Cocoa application in Objective-C for production test control, data collection, and pass/fail reporting in manufacturing environments.

      - company: Research In Motion (BlackBerry)
        position: Wireless Hardware Engineering Intern
        location: Sunrise, Florida
        start_date: 2011
        end_date: 2011
        highlights:
          - Performed receiver sensitivity and desense testing for GSM/WCDMA devices, investigating RF performance degradation due to EMI and digital noise coupling.
          - Implemented mitigations via drive-strength tuning, shielding and grounding changes, and board-level coupling investigations.

    Publications:
      - title: "Musical Source Separation Bake-Off: Comparing Objective Metrics with Human Perception"
        publisher: Proceedings of the IEEE Workshop on Applications of Signal Processing to Audio and Acoustics (WASPAA)
        releaseDate: 2025-11-14
        url: https://arxiv.org/abs/2507.06917

      - title: "PHOTON: Non-Invasive Optical Tracking of Key-Lever Motion in Historical Keyboard Instruments"
        publisher: Proceedings of the International Conference on New Interfaces for Musical Expression (NIME)
        releaseDate: 2026
        summary: Accepted for publication

      - title: "The Portable Harpsichord: Past and Present"
        publisher: "Harpsichord & fortepiano Magazine"
        releaseDate: 2026

    Skills:
      - name: RF and hardware systems
        keywords:
          - RF systems debugging
          - bench characterization
          - factory bring-up

      - name: Software and analysis
        keywords:
          - Python-based test automation
          - analytics tooling
          - data visualization

      - name: Embedded systems
        keywords:
          - RFFE configuration modeling
          - firmware integration workflows
          - custom sensor boards and PCBs

      - name: Research instruments
        keywords:
          - historical keyboard instrument sensing systems
          - research prototyping
          - multimodal performance data
